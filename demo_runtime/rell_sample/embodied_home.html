<!doctype html>
<html lang="zh-CN">
<head>

  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Segoe UI,"Microsoft YaHei",sans-serif;background:#101316;color:#e9edf0;overflow:hidden}

    h1{font-size:18px;margin:0 0 4px;letter-spacing:0}.sub{font-size:12px;color:#aeb8bf;margin-bottom:12px}.row{display:flex;gap:8px}.row>*{min-width:0}.row input{flex:1;width:auto}.row #send{flex:0 0 70px}input,select,button{height:38px;border-radius:4px;border:1px solid #4a555d;background:#20262a;color:#f4f6f7;padding:0 10px;font:inherit}button{cursor:pointer;background:#d7e8dd;color:#14201a;border-color:#d7e8dd;font-weight:600}button:disabled{cursor:not-allowed;opacity:.45}button.secondary{background:#293136;color:#e6ebee;border-color:#4a555d}.row button{flex:1}.confirmation{display:none;margin-top:8px;padding:8px;border:1px solid #6f7952;background:#24291e;border-radius:4px}.confirmation.show{display:block}.confirmation p{margin:0 0 7px;font-size:12px;color:#e8edcf}.teaching-panel{display:none;margin-top:8px;padding:8px;border:1px solid #4d6158;background:#171d1a;border-radius:4px}.teaching-panel.show{display:block}.inquiry-result{display:none;margin-top:6px;padding:7px;border:1px solid #3b5047;background:#111815;color:#cbd8d1;font:11px/1.45 Consolas,monospace;white-space:pre-wrap;overflow-wrap:anywhere}.inquiry-result.show{display:block}.view-switch button.active{background:#d7e8dd;color:#14201a}.control-grid{display:grid;grid-template-columns:repeat(3,42px) 1fr;grid-template-rows:42px 42px;gap:6px;margin-top:7px}.control-grid button{height:42px;padding:0;font-size:20px}.control-grid .grasp{grid-column:4;grid-row:1/3;height:90px;padding:0 8px;font-size:13px}.control-grid .forward{grid-column:2;grid-row:1}.control-grid .left{grid-column:1;grid-row:2}.control-grid .backward{grid-column:2;grid-row:2}.control-grid .right{grid-column:3;grid-row:2}.service-controls{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}.service-controls button{height:36px}.signal-label{margin:9px 0 5px;font-size:11px;color:#9eaaa3}.signal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}.signal-grid button{height:30px;padding:0 3px;font-size:11px}.timeline{height:142px;margin-top:7px;overflow-y:auto;border:1px solid #303b35;background:#0d1210;padding:6px}.timeline-empty{padding:8px;color:#7f8b84;font-size:11px;text-align:center}.timeline-event{display:grid;grid-template-columns:20px 1fr;gap:6px;padding:5px 2px;border-bottom:1px solid #26302b}.timeline-event:last-child{border-bottom:0}.timeline-seq{color:#78b795;font:11px/1.4 Consolas,monospace}.timeline-detail{font-size:11px;line-height:1.4;color:#d7dfda}.timeline-meta{color:#839089;font-size:10px}.teaching-actions{margin-top:7px}.evaluation{display:none;margin-top:7px}.evaluation.show{display:flex}.status{margin-top:10px;padding-top:10px;border-top:1px solid #343c41;font-size:13px;line-height:1.55}.status strong{color:#a9d8bd}.log{margin-top:8px;max-height:150px;overflow-y:auto;overflow-x:hidden;overflow-wrap:anywhere;word-break:break-word;background:#0d1012;border:1px solid #30373b;padding:8px;font:12px/1.5 Consolas,monospace;white-space:pre-wrap}.legend{position:fixed;z-index:2;right:16px;bottom:16px;background:rgba(20,24,27,.9);border:1px solid #3a4247;border-radius:6px;padding:10px;font-size:12px;color:#c9d0d4}.dot{display:inline-block;width:9px;height:9px;margin-right:5px;border-radius:2px}.feedback{position:fixed;z-index:3;left:50%;bottom:20px;transform:translateX(-50%);background:#edf4ef;color:#17221b;border-radius:4px;padding:9px 14px;font-size:13px;opacity:0;transition:opacity .2s;max-width:min(640px,calc(100vw - 24px))}.feedback.show{opacity:1}@media(max-width:680px){.legend{display:none}.panel{top:8px;left:8px;width:calc(100vw - 16px);max-height:calc(100vh - 16px)}.log{max-height:92px}}
  </style>
</head>
<body>
  <div id="scene"></div>
  <div id="robotSpeech" class="robot-speech" role="status" aria-live="polite"></div>
  <section class="panel">
    <h1>具身家庭实验场</h1>
    <div class="sub">空间语义 × 本体画像 × 连续运动反馈</div>
    <div class="row"><select id="sceneMode" aria-label="选择家庭空间场景"></select><button id="switchScene" class="secondary" onclick="location.href='/embodied?scene='+encodeURIComponent(document.getElementById('sceneMode').value)">载入场景</button></div>
    <div class="row" style="margin-top:8px"><select id="bodyMode" aria-label="选择机器人本体"><option value="home_humanoid">人形机器人本体</option><option value="home_mobile_manipulator">轮式机器人本体</option></select><button id="switchBody" class="secondary" onclick="location.href='/embodied?scene='+encodeURIComponent(document.getElementById('sceneMode').value)+'&body='+encodeURIComponent(document.getElementById('bodyMode').value)">载入本体</button></div>
    <div class="row"><input id="command" value="给我接一杯水" aria-label="教学或动作指令"><button id="send">发送</button></div>
    <div class="row" style="margin-top:8px"><select id="stoolMode"><option value="ahead">前方可绕位置</option><option value="narrow">狭窄门口不可绕</option></select><button id="stool" class="secondary">放置凳子</button><button id="reset" class="secondary">重置</button></div>
    <div class="row" style="margin-top:8px"><select id="policyMode"><option value="none">无保护策略覆盖</option><option value="protected_home">受保护家庭场景</option></select><button id="applyPolicy" class="secondary">应用执行策略</button></div>
    <div class="row" style="margin-top:8px"><select id="perceptionMode"><option value="normal">单杯清晰</option><option value="multiple_cups">两个杯子</option><option value="occluded_cup">正面遮挡</option><option value="relocated_cup">杯子移位</option><option value="relocated_apple">苹果移位</option></select><button id="applyPerception" class="secondary">应用感知场景</button></div>
    <div class="row" style="margin-top:8px"><select id="inquiryMode" aria-label="选择认识目标闭环"><option value="quality_profile_drift">质量档案漂移</option><option value="recovery_boundary_probe">恢复边界探测</option><option value="concept_promote">候选概念晋级</option><option value="concept_reject">候选概念否决</option></select><button id="runInquiry" class="secondary">运行认识闭环</button></div>
    <div id="inquiryResult" class="inquiry-result" aria-live="polite"></div>
    <div class="row" style="margin-top:8px"><button id="runLearned" class="secondary" disabled>执行已学经验</button><button id="startTeaching" class="secondary">进入真人教学</button></div>
    <div id="teachingPanel" class="teaching-panel">
      <div class="row view-switch"><button id="firstPerson" class="secondary">第一视角</button><button id="safetyView" class="secondary">安全视角</button></div>
      <div class="control-grid"><button class="forward secondary" data-control="forward" title="向前移动">↑</button><button class="left secondary" data-control="turn_left" title="原地左转">↶</button><button class="backward secondary" data-control="backward" title="向后移动">↓</button><button class="right secondary" data-control="turn_right" title="原地右转">↷</button><button class="grasp" data-control="grasp">抓取目标</button></div>
      <div class="service-controls"><button data-control="fill" title="在已对准的水源处为当前杯子接水">接水并验真</button><button data-control="handover" title="把当前杯子交给已准备接收的人">交给人并验真</button></div>
      <div class="signal-label">教学信令</div>
      <div class="signal-grid"><button class="secondary" data-signal="demonstration" title="标记正例示范">示范</button><button class="secondary" data-signal="correction" title="纠正既有候选，不直接覆盖">纠正</button><button class="secondary" data-signal="boundary_indication" title="标记安全或物理边界">边界</button><button class="secondary" data-signal="negative_example" title="标记负例，不进入正向过程链">负例</button><button class="secondary" data-signal="confirmation" title="记录教师确认，不能替代物理验真">确认</button></div>
      <div id="teachingTimeline" class="timeline" aria-live="polite"><div class="timeline-empty">开始教学后显示技术链事件</div></div>
      <div class="row teaching-actions"><button id="finishTeaching" class="secondary">完成示教</button><button id="replayTeaching" class="secondary" disabled>机器人试做</button></div>
      <div id="evaluation" class="row evaluation"><button id="acceptReplay">做得很好</button><button id="correctReplay" class="secondary">重新教学</button></div>
    </div>
    <div id="confirmation" class="confirmation"><p id="confirmationPrompt"></p><div class="row"><button id="approve">确认本次执行</button><button id="decline" class="secondary">取消</button></div></div>
    <div class="status">主体：<strong id="body">-</strong><br>区域：<strong id="region">-</strong>　状态：<strong id="state">准备中</strong></div>
    <div id="log" class="log"></div>
  </section>
  <div class="legend"><div><span class="dot" style="background:#d8e8df"></span>客厅</div><div><span class="dot" style="background:#e8e4d8"></span>走廊</div><div><span class="dot" style="background:#dce4ee"></span>厨房</div></div>
  <div id="feedback" class="feedback"></div>
  <script src="/vendor/three.min.js"></script>
  <script>
  (async function(){
    const sceneQuery=new URLSearchParams(location.search);const selectedScene=sceneQuery.get('scene')||'home_semantic_3d_a';const selectedBody=sceneQuery.get('body')||'home_humanoid';
    const sceneOptions=await fetch('/embodied/scenes').then(r=>r.json());const sceneMode=document.querySelector('#sceneMode');for(const option of sceneOptions.scenes||[]){const item=document.createElement('option');item.value=option.scene_id;item.textContent=option.display_name;sceneMode.appendChild(item)}sceneMode.value=selectedScene;
    document.querySelector('#bodyMode').value=selectedBody;
    const sceneData=await fetch(`/embodied/scene?scene_id=${encodeURIComponent(selectedScene)}`).then(r=>r.json());
    const session=await fetch('/embodied/session/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scene_id:selectedScene,executor_profile_id:selectedBody})}).then(r=>r.json());
    if(session.error){document.querySelector('#state').textContent='场景加载失败';document.querySelector('#log').textContent=`${session.error}${session.executor_profile_id?`：${session.executor_profile_id}`:''}`;throw new Error(session.error)}
    let sessionId=session.session_id, robot, stoolMesh, speechUntil=0, pendingConfirmationId=null, pendingUtterance='', cameraMode='safety',teachingBusy=false,heldTeachingControl=null,availableExperienceId=session.available_local_experiences?.[0]?.experience_id||null;
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x151a1d); scene.fog=new THREE.Fog(0x151a1d,10,22);
    const camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,.1,100);
    function frameCamera(){const compact=innerWidth<960;camera.position.set(compact?9.6:7,compact?10.6:8,compact?10.6:8);camera.lookAt(compact?-1.0:0,0,0)} frameCamera();
    const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight); renderer.shadowMap.enabled=true; document.querySelector('#scene').appendChild(renderer.domElement);
    scene.add(new THREE.HemisphereLight(0xe9f4ff,0x3b4246,2.2)); const sun=new THREE.DirectionalLight(0xffffff,2.4); sun.position.set(4,7,5); sun.castShadow=true; scene.add(sun);
    const mat=c=>new THREE.MeshStandardMaterial({color:c==null?0x87939a:c,roughness:.72,metalness:.04});
    const toThreeGround=p=>[p[0],0,-p[1]];
    const baseFloor=new THREE.Mesh(new THREE.BoxGeometry(10,.08,4.6),mat(0x3c454a));baseFloor.position.y=-.04;baseFloor.receiveShadow=true;scene.add(baseFloor);
    for(const r of sceneData.semantic_regions){const g=new THREE.BoxGeometry(r.size[0],.08,r.size[1]);const m=new THREE.Mesh(g,mat(r.color));const rp=toThreeGround(r.center);m.position.set(rp[0],.02,rp[2]);m.receiveShadow=true;scene.add(m);}
    const wallMat=mat(0x596168); for(const x of [-5,5]){const w=new THREE.Mesh(new THREE.BoxGeometry(.12,1.1,4.7),wallMat);w.position.set(x,.55,0);scene.add(w)} for(const z of [-2.3,2.3]){const w=new THREE.Mesh(new THREE.BoxGeometry(10.1,1.1,.12),wallMat);w.position.set(0,.55,z);scene.add(w)}
    const meshes={}; let stepPhase=0; let lastRobotPosition=null;
    function part(group,geometry,color,position=[0,0,0]){const mesh=new THREE.Mesh(geometry,mat(color));mesh.position.set(...position);mesh.castShadow=true;mesh.receiveShadow=true;group.add(mesh);return mesh}
    function createObjectMesh(o){const [sx,sy,sz]=o.size;if(o.kind==='graspable_object'){const mesh=new THREE.Mesh(new THREE.SphereGeometry(sx/2,24,16),mat(o.color));mesh.castShadow=true;mesh.receiveShadow=true;return mesh}const group=new THREE.Group();if(o.kind==='large_furniture'){part(group,new THREE.BoxGeometry(sx,sz*.34,sy*.86),o.color,[0,-sz*.16,0]);part(group,new THREE.BoxGeometry(sx*.88,sz*.8,.16),o.color,[0,sz*.18,-sy*.4]);part(group,new THREE.BoxGeometry(.12,sz*.72,.18),o.color,[-sx*.44,sz*.03,sy*.38]);part(group,new THREE.BoxGeometry(.12,sz*.72,.18),o.color,[sx*.44,sz*.03,sy*.38])}else if(o.kind==='operation_surface'){part(group,new THREE.BoxGeometry(sx,Math.min(.14,sz*.18),sy),o.color,[0,sz*.25,0]);for(const x of [-sx*.38,sx*.38])for(const z of [-sy*.38,sy*.38])part(group,new THREE.BoxGeometry(.1,sz*.5,.1),o.color,[x,-sz*.02,z])}else if(o.kind==='water_source'){part(group,new THREE.BoxGeometry(sx,sz*.75,sy),o.color,[0,-sz*.05,0]);part(group,new THREE.CylinderGeometry(.05,.05,sy*.72,12),0x71838a,[0,sz*.35,0]);part(group,new THREE.SphereGeometry(.09,12,8),0x71838a,[0,sz*.35,sy*.28])}else if(o.kind==='graspable_container'){part(group,new THREE.CylinderGeometry(sx*.42,sx*.5,sz*.72,24),o.color,[0,0,0]);part(group,new THREE.TorusGeometry(sx*.42,.025,8,24),0xdce6ea,[0,sz*.36,0]);const liquid=part(group,new THREE.CylinderGeometry(sx*.37,sx*.39,sz*.08,20),0x4d9fd1,[0,sz*.25,0]);liquid.name='liquid';liquid.visible=o.liquid_state==='filled'}else if(o.kind==='human_recipient'){part(group,new THREE.SphereGeometry(sx*.28,18,12),0xd6aa88,[0,sz*.39,0]);part(group,new THREE.CylinderGeometry(sx*.34,sx*.42,sz*.46,16),o.color,[0,sz*.08,0]);for(const z of [-sy*.23,sy*.23])part(group,new THREE.CylinderGeometry(.045,.05,sz*.42,10),0x34454d,[0,-sz*.28,z]);for(const z of [-sy*.32,sy*.32]){const arm=part(group,new THREE.CylinderGeometry(.035,.045,sz*.34,10),o.color,[sx*.18,sz*.06,z]);arm.rotation.z=Math.PI/2.8}}else if(o.kind==='movable_obstacle'){part(group,new THREE.BoxGeometry(sx,sz*.12,sy),o.color,[0,sz*.26,0]);part(group,new THREE.BoxGeometry(sx*.9,sz*.62,.1),o.color,[0,sz*.05,-sy*.4]);for(const x of [-sx*.38,sx*.38])for(const z of [-sy*.35,sy*.35])part(group,new THREE.BoxGeometry(.07,sz*.5,.07),o.color,[x,-sz*.02,z])}else{part(group,new THREE.BoxGeometry(sx,sz,sy),o.color)}return group}
    function positionObjectMesh(m,o){const op=toThreeGround(o.position);m.position.set(op[0],(o.elevation_m||0)+o.size[2]/2,op[2]);m.userData=o}
    for(const o of sceneData.objects){const m=createObjectMesh(o);positionObjectMesh(m,o);meshes[o.entity_id]=m;if(o.active!==false)scene.add(m)} stoolMesh=meshes.stool_dynamic;
    let head;function buildRobot(profile){const group=new THREE.Group();const legs=[];if(profile.body_profile==='humanoid_biped'){const pelvis=new THREE.Mesh(new THREE.BoxGeometry(.24,.22,.34),mat(0x2d7373));pelvis.position.y=.72;group.add(pelvis);const torso=new THREE.Mesh(new THREE.BoxGeometry(.28,.58,.42),mat(0xe2e8e6));torso.position.y=1.02;group.add(torso);head=new THREE.Mesh(new THREE.SphereGeometry(.16,18,12),mat(0x202b31));head.position.y=1.52;group.add(head);const face=new THREE.Mesh(new THREE.BoxGeometry(.045,.11,.21),mat(0xa5d6d8));face.position.set(.155,1.52,0);group.add(face);for(const z of [-.13,.13]){const leg=new THREE.Mesh(new THREE.CylinderGeometry(.055,.065,.62,12),mat(0x3f555b));leg.position.set(0,.37,z);group.add(leg);legs.push(leg)}for(const z of [-.27,.27]){const arm=new THREE.Mesh(new THREE.CylinderGeometry(.045,.05,.52,12),mat(0x6f8586));arm.rotation.x=z<0?.12:-.12;arm.position.set(0,1.02,z);group.add(arm)}}else{const base=new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,.32,24),mat(0x2d7373));base.position.y=.18;group.add(base);const torso=new THREE.Mesh(new THREE.BoxGeometry(.46,.72,.36),mat(0xe2e8e6));torso.position.y=.7;group.add(torso);head=new THREE.Mesh(new THREE.BoxGeometry(.32,.25,.28),mat(0x202b31));head.position.y=1.18;group.add(head)}for(const mesh of group.children){mesh.castShadow=true;mesh.receiveShadow=true}group.userData.legs=legs;const arrow=new THREE.Mesh(new THREE.ConeGeometry(.09,.28,12),mat(0xe4b647));arrow.rotation.z=-Math.PI/2;arrow.position.set(.42,.34,0);group.add(arrow);return group}robot=buildRobot(session.executor_profile);scene.add(robot);
    function setRobot(p,yawDeg=null){const rp=toThreeGround(p);if(lastRobotPosition){const delta=Math.hypot(p[0]-lastRobotPosition[0],p[1]-lastRobotPosition[1]);if(delta>0.001&&robot.userData.legs?.length===2){stepPhase+=delta*28;robot.userData.legs[0].rotation.z=Math.sin(stepPhase)*.35;robot.userData.legs[1].rotation.z=-Math.sin(stepPhase)*.35}}lastRobotPosition=[...p];robot.position.set(rp[0],0,rp[2]);robot.userData.semanticPosition=[...p];const sceneNode=document.querySelector('#scene');sceneNode.dataset.semanticX=String(p[0]);sceneNode.dataset.semanticY=String(p[1]);if(yawDeg!==null){robot.rotation.y=THREE.MathUtils.degToRad(yawDeg);robot.userData.semanticYawDeg=yawDeg;sceneNode.dataset.semanticYawDeg=String(yawDeg)}} setRobot(session.state.executor_position,session.state.executor_yaw_deg);
    let currentExecutionHorizon=null;const horizonLabel=h=>({atomic_action:'原子动作',short_horizon:'短程任务',long_horizon:'长程意图',decomposition_required:'待分解目标',completed:'已完成任务'}[h]||'任务意图');
    const log=t=>{const e=document.querySelector('#log');const h=currentExecutionHorizon;const rendered=t.replace('长程意图：',`${horizonLabel(h?.horizon_class)}${h?.metrics?`[剩余节点=${h.metrics.remaining_node_count},分支=${h.metrics.branch_node_count},汇合=${h.metrics.join_node_count}]`:''}：`);e.textContent=rendered+'\n'+e.textContent};
    function renderTeachingTimeline(s){const timeline=document.querySelector('#teachingTimeline'),events=s?.teaching_session?.teaching_events||[];if(!events.length){timeline.innerHTML='<div class="timeline-empty">开始教学后显示技术链事件</div>';return}timeline.replaceChildren(...events.map(event=>{const row=document.createElement('div');row.className='timeline-event';const seq=document.createElement('div');seq.className='timeline-seq';seq.textContent=String(event.sequence).padStart(2,'0');const content=document.createElement('div');const detail=document.createElement('div');detail.className='timeline-detail';detail.textContent=event.detail;const meta=document.createElement('div');meta.className='timeline-meta';meta.textContent=`${event.stage} · ${event.status}${event.candidate_only?' · 候选':''}`;content.append(detail,meta);row.append(seq,content);return row}));timeline.scrollTop=timeline.scrollHeight}
    const update=s=>{document.querySelector('#body').textContent=s.executor_profile.body_profile;document.querySelector('#region').textContent=s.state.active_region;const active=(s.long_horizon_intents||{})[s.active_intent_id];currentExecutionHorizon=active?.execution_horizon||null;renderTeachingTimeline(s)}; update(session);
    function speak(text,duration=5200){const bubble=document.querySelector('#robotSpeech');bubble.textContent=text;bubble.classList.add('show');speechUntil=duration===0?Infinity:Date.now()+duration}
    function updateTeachingCamera(){if(cameraMode!=='first_person')return;const p=robot.userData.semanticPosition||[-3,-1.2],yaw=THREE.MathUtils.degToRad(robot.userData.semanticYawDeg||0);camera.position.set(p[0],1.22,-p[1]);camera.lookAt(p[0]+Math.cos(yaw)*2.4,1.08,-(p[1]+Math.sin(yaw)*2.4))}
    function positionSpeech(){if(!robot)return;const bubble=document.querySelector('#robotSpeech');if(cameraMode==='first_person'){bubble.classList.remove('show');return}const p=new THREE.Vector3();robot.getWorldPosition(p);p.y+=1.55;p.project(camera);let left=(p.x*.5+.5)*innerWidth;let top=(-p.y*.5+.5)*innerHeight;const panel=document.querySelector('.panel').getBoundingClientRect();if(left-115<panel.right+10&&top<panel.bottom+70){left=Math.min(innerWidth-125,panel.right+130);top=Math.max(70,top)}bubble.style.left=`${left}px`;bubble.style.top=`${top}px`;if(Date.now()>speechUntil)bubble.classList.remove('show')}
    async function animateFrames(frames){for(const f of frames){setRobot(f.position,f.yaw_deg??null);positionSpeech();await new Promise(r=>setTimeout(r,45))}}
    function showConfirmation(pending,prompt,utterance){pendingConfirmationId=pending.confirmation_id;pendingUtterance=utterance;document.querySelector('#confirmationPrompt').textContent=prompt;document.querySelector('#approve').textContent=pending.kind==='observation_candidate'?`确认这是${pending.concept_display_name||'该对象'}`:'确认本次执行';document.querySelector('#confirmation').classList.add('show')}
    function clearConfirmation(){pendingConfirmationId=null;pendingUtterance='';document.querySelector('#approve').textContent='确认本次执行';document.querySelector('#confirmation').classList.remove('show')}
    function syncRuntimeObjects(objects){const present=new Set(objects.map(o=>o.entity_id));for(const id of Object.keys(meshes)){if((id==='cup_b'||id.includes('perception_variant')||id==='occluder_panel')&&!present.has(id)){scene.remove(meshes[id]);delete meshes[id]}}for(const o of objects){if(o.entity_id==='stool_dynamic')continue;let m=meshes[o.entity_id];if(!m){m=createObjectMesh(o);meshes[o.entity_id]=m;scene.add(m)}const liquid=m.getObjectByName?.('liquid');if(liquid)liquid.visible=o.liquid_state==='filled';if(o.attached_to_executor){robot.add(m);const handPose=o.held_by_effector==='left_hand'?[-.36,.88,.12]:o.held_by_effector==='right_hand'?[.36,.88,.12]:[.48,.78,0];m.position.set(...handPose);m.rotation.set(0,0,0);m.userData=o}else{scene.add(m);positionObjectMesh(m,o)}}}
    function highlightGrounded(r){for(const m of Object.values(meshes)){if(m.material?.emissive)m.material.emissive.setHex(0x000000)}for(const option of r.concept_grounding?.candidate_options||[]){const m=meshes[option.entity_ref];if(m?.material?.emissive)m.material.emissive.setHex(0x806d18)}for(const b of r.concept_grounding?.candidate_bindings||[]){const m=meshes[b.entity_ref];if(m?.material?.emissive)m.material.emissive.setHex(b.role==='target'?0x267a51:0x6b551c)}}
    function animateActivePerception(r){if(r.long_horizon_intent?.execution_horizon)currentExecutionHorizon=r.long_horizon_intent.execution_horizon;const trace=r.active_perception_trace||[];if(trace.length<2)return;const offset=trace[1].viewpoint?.yaw_offset_deg||0;head.rotation.y=THREE.MathUtils.degToRad(-offset);setTimeout(()=>{head.rotation.y=0},2800)}
    function finishMotionResult(r,utterance){if(r.session){update(r.session);syncRuntimeObjects(r.session.runtime_objects||[])}highlightGrounded(r);animateActivePerception(r);document.querySelector('#state').textContent=r.status;const bodyExplanation=r.body_self_judgment?.explanation||'';const conceptExplanation=r.factory_concept?.explanation||'';const gapSlots=r.concept_gap_analysis?.slots;const selfReport=r.knowledge_self_report;const selfExplanation=selfReport?`主体认知边界：已知=${selfReport.known.map(x=>x.value).join('；')||'无'} / 未知=${selfReport.unknown.map(x=>x.description).join('；')} / 不能执行=${selfReport.cannot_do_because} / 下一安全路径=${selfReport.next_safe_route}`:'';const dialogueExplanation=gapSlots?`概念缺口会话：target=${gapSlots.target_entity?.label||'未知'} / postcondition=${gapSlots.desired_postcondition||'未知'} / verification=${gapSlots.verification_condition||'未知'} / pending=${r.concept_gap_analysis.pending_slot||'无'} / 分析=${r.concept_gap_analysis.analysis_ms??'-'}ms`:'';const gaps=r.prerequisite_analysis?.gaps||[];const gapExplanation=gaps.length?`前提缺口：${gaps.map(x=>`${x.fact}[${x.truth_status}]→${x.response}`).join('；')}`:'';const plan=r.candidate_execution_plan;const planExplanation=plan?`候选执行计划：目标=${plan.goal_fact||'待验真目标'} / 过程=${(plan.candidate_process||[]).join(' → ')||'待编排'} / 缺失前提=${plan.missing_precondition||'无'} / candidate_only=${plan.candidate_only}`:'';const longIntent=r.long_horizon_intent;const longIntentExplanation=longIntent?`长程意图：目标=${longIntent.goal_fact} / 生命周期=${longIntent.lifecycle} / 当前阶段=${longIntent.current_stage?.stage_id||'无'} / 已验真=${(longIntent.verified_facts||[]).join('、')||'无'} / 旧路径持久化=${longIntent.trajectory_persisted}`:'';const causalNodes=r.causal_candidate?.nodes||[];const metrics=r.causal_candidate?.search_metrics,latency=r.causal_candidate?.decision_latency;const causalExplanation=causalNodes.length?`候选因果链：${causalNodes.map(x=>`${x.operator}[${x.gate}]`).join(' → ')}；runtime_fact_committed=${r.causal_candidate.runtime_fact_committed}${metrics?`；求解=${metrics.total_solver_ms}ms（注册表=${metrics.registry_compile_ms}ms/反向搜索=${metrics.backward_search_ms}ms/排序=${metrics.topological_sort_ms}ms）`:''}${latency?`；输入到决策=${latency.input_to_candidate_decision_ms}ms`:''}`:'';const grounding=r.concept_grounding?.grounding_status?`概念感知：${r.concept_grounding.grounding_status} / ${r.concept_grounding.ambiguity_reason||'关系已落地'} / 运行时事实提交=${r.concept_grounding.runtime_fact_committed}`:'';const language=r.language_understanding;const languageExplanation=language?`语言概念：言语行为=${language.speech_act} / 算子=${(language.operators||[]).join(' → ')||'未知'} / 对象=${(language.recognized_entities||[]).join('、')||'未知'} / 规范表达=${language.canonical_utterance||'未形成'} / 置信=${language.confidence_band}(${language.confidence}) / 未决=${(language.unresolved_slots||[]).join('、')||'无'}`:'';const humanUnderstanding=language?.human_understanding_response?`语义回读：${language.human_understanding_response}`:'';const primary=[languageExplanation,humanUnderstanding,grounding,conceptExplanation,bodyExplanation,r.prompt||r.reason||r.route_kind||r.status,longIntentExplanation,planExplanation].filter(Boolean).join('\n');log(`${utterance}\n${primary}${selfExplanation?`\n${selfExplanation}`:''}${dialogueExplanation?`\n${dialogueExplanation}`:''}${gapExplanation?`\n${gapExplanation}`:''}${causalExplanation?`\n${causalExplanation}`:''}`);const message=selfReport?.spoken_summary||r.prompt||(bodyExplanation?`${bodyExplanation} 动作已完成。`:`已完成：${r.terminal_fact}`);if(r.pending_confirmation)showConfirmation(r.pending_confirmation,message,utterance);if(r.experience?.status==='awaiting_human_acceptance')document.querySelector('#evaluation').classList.add('show');const teachingButton=document.querySelector('#startTeaching');if(selfReport){teachingButton.disabled=!r.post_action?.teaching_available;teachingButton.classList.toggle('secondary',!r.post_action?.teaching_available)}else if(r.post_action?.teaching_available){teachingButton.disabled=false;teachingButton.classList.remove('secondary')}const persistent=r.status==='requires_human_confirmation'||r.status==='stopped_by_physical_obstacle'||r.status==='active_perception_required'||r.status?.startsWith('perception_')||r.status==='factory_concept_recognized_execution_gap'||r.status==='factory_concept_gap'||r.status==='concept_gap_clarification_required'||r.status==='temporary_effect_contract_compiled'||r.status==='observation_candidate_confirmation_required'||r.status==='language_adapter_confirmation_required'||r.status==='language_interpretation_confirmation_required';speak(message,persistent?0:5200);const f=document.querySelector('#feedback');f.textContent=message;f.classList.add('show');setTimeout(()=>f.classList.remove('show'),2600)}
    async function runStarted(started,utterance){if(started.immediate_result){finishMotionResult(started.immediate_result,utterance);return}let jobId=started.job_id;if(started.body_self_judgment?.explanation)speak(started.body_self_judgment.explanation,0);while(jobId){const step=await fetch('/embodied/motion/step',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:jobId})}).then(x=>x.json());if(step.status==='path_invalidated_and_replanned'){log(`环境或策略已变化，旧路径 ${step.old_job_id} 作废并重新判断`);const replacement=step.replacement;if(replacement.immediate_result){finishMotionResult(replacement.immediate_result,utterance);return}jobId=replacement.job_id;if(replacement.body_self_judgment?.explanation)speak(replacement.body_self_judgment.explanation,0);continue}if(step.frame)setRobot(step.frame.position,step.frame.yaw_deg??null);if(step.session)update(step.session);positionSpeech();if(step.status==='motion_completed'){finishMotionResult(step.result,utterance);if(step.result?.next_stage_started?.job_id){jobId=step.result.next_stage_started.job_id;continue}return}if(step.error){speak(`运动停止：${step.error}`,0);document.querySelector('#state').textContent=step.error;return}await new Promise(resolve=>setTimeout(resolve,step.frame?.duration_ms||45))}}
    async function startEmbodiedCommand(utterance){return fetch('/embodied/motion/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,utterance})}).then(x=>x.json())}
    async function renewEmbodiedSession(){const renewed=await fetch('/embodied/session/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scene_id:selectedScene,executor_profile_id:selectedBody})}).then(x=>x.json());if(renewed.error)throw new Error(renewed.error);sessionId=renewed.session_id;pendingConfirmationId=null;pendingUtterance='';update(renewed);syncRuntimeObjects(renewed.runtime_objects||[]);setRobot(renewed.state.executor_position,renewed.state.executor_yaw_deg);return renewed}
    async function send(){const button=document.querySelector('#send');button.disabled=true;clearConfirmation();const utterance=document.querySelector('#command').value.trim();document.querySelector('#state').textContent='执行中';speak('我正在处理这个指令…',2400);try{let started=await startEmbodiedCommand(utterance);if(started.error==='embodied_session_not_found'){await renewEmbodiedSession();started=await startEmbodiedCommand(utterance)}if(started.error)throw new Error(started.error);if(!started.immediate_result&&!started.job_id){finishMotionResult(started,utterance);return}await runStarted(started,utterance)}catch(error){document.querySelector('#state').textContent='后端连接失败';const message='后端当前没有返回，我会保留当前页面状态，请稍后重试。';speak(message,0);log(`${utterance}\n${message}\n${error.message||error}`)}finally{button.disabled=false}}
    async function answerConfirmation(approved){if(!pendingConfirmationId)return;const confirmationId=pendingConfirmationId,utterance=pendingUtterance;clearConfirmation();document.querySelector('#state').textContent=approved?'授权校验中':'取消中';const started=await fetch('/embodied/motion/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,confirmation_id:confirmationId,approved})}).then(x=>x.json());if(!approved||started.status==='confirmation_not_current'||started.status==='observation_candidate_confirmed'){finishMotionResult(started,utterance);return}await runStarted(started,utterance)}
    async function placeStool(){const mode=document.querySelector('#stoolMode').value;const r=await fetch('/embodied/obstacle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,mode})}).then(x=>x.json());const o=r.active_obstacles[0];if(stoolMesh.parent)scene.remove(stoolMesh);const sp=toThreeGround(o.position);stoolMesh.position.set(sp[0],.275,sp[2]);scene.add(stoolMesh);log(`凳子已放置：${mode}`)}
    async function applyPolicy(){const protectedMode=document.querySelector('#policyMode').value==='protected_home';const policy=protectedMode?{declaration_id:'protected_home_motion_demo',policy_scope:['embodied_motion'],motion_policy:{max_speed_mps:.25,max_contact_force_n:12,minimum_avoidance_distance_m:.2,continuous_motion_requires_confirmation:true},execution_receipt_required:true}:null;const r=await fetch('/embodied/policy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,policy_overlay:policy})}).then(x=>x.json());const e=r.effective_execution_envelope;log(protectedMode?`P6 执行策略已覆盖：速度 ${e.effective_constraints.max_linear_speed_mps}m/s，避让增量 ${e.effective_constraints.minimum_avoidance_distance_m}m`:'P6 执行策略覆盖已撤销，本体固有画像未改变');speak(protectedMode?'保护策略已加载，我会收紧运动边界。':'保护策略覆盖已撤销。',4200)}
    async function applyPerceptionScenario(){const mode=document.querySelector('#perceptionMode').value;const r=await fetch('/embodied/perception/scenario',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,mode})}).then(x=>x.json());syncRuntimeObjects(r.runtime_objects||[]);if(r.session)update(r.session);highlightGrounded({});document.querySelector('#state').textContent='环境已变化';const labels={normal:'已恢复单杯清晰场景。',multiple_cups:'操作台上现在有两个杯子。',occluded_cup:'正面视角中的杯子现在被遮挡。',relocated_cup:'杯子已移动到操作台另一侧。',relocated_apple:'苹果已移动到客厅另一处。'};log(`${labels[mode]} 旧观测候选已失效。`);speak(`${labels[mode]} 我会依据新观测重新判断。`,4200)}
    async function runCognitiveInquiry(){const button=document.querySelector('#runInquiry'),output=document.querySelector('#inquiryResult'),scenario=document.querySelector('#inquiryMode').value;button.disabled=true;output.classList.add('show');output.textContent='认识闭环运行中…';try{let r=await fetch('/cognitive/inquiry/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,scenario})}).then(x=>x.json());if(r.error==='embodied_session_not_found'){await renewEmbodiedSession();r=await fetch('/cognitive/inquiry/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,scenario})}).then(x=>x.json())}if(r.error)throw new Error(`${r.error}${r.detail?`：${r.detail}`:''}`);const shared=r.shared_readback||{};output.textContent=[`${r.scenario_label} · ${r.inquiry_status}`,`竞争假设：${(r.competing_hypotheses||[]).join(' / ')}`,`结论：${r.selected_hypothesis}`,`P018：${r.p018_arbitration?.decision||'-'} · P016：${r.p016_verification_ref||'-'}`,`引用：Event=${r.event_ref} · Predicate=${r.predicate_ref} · Evidence=${r.evidence_ref}`,`同源读取：${shared.same_fact_authority&&shared.same_predicate_ref&&shared.same_evidence_refs?'通过':'失败'} · 直接执行权=${r.direct_execution_allowed}`].join('\n');log(`认识目标闭环：${r.scenario_label}\n状态=${r.inquiry_status} / 结论=${r.selected_hypothesis}\n事实权威=${r.fact_authority_ref}\nP018=${r.p018_arbitration?.arbitration_id} / P016=${r.p016_verification_ref}`);document.querySelector('#state').textContent='认识闭环已关闭'}catch(error){output.textContent=`认识闭环失败：${error.message||error}`;document.querySelector('#state').textContent='认识闭环失败'}finally{button.disabled=false}}
    function setCameraMode(mode){cameraMode=mode;document.querySelector('#firstPerson').classList.toggle('active',mode==='first_person');document.querySelector('#safetyView').classList.toggle('active',mode==='safety');if(mode==='safety')frameCamera()}
    async function startTeaching(){const goal=document.querySelector('#command').value.trim()||'拿杯子';const request=()=>fetch('/embodied/teaching/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,goal_utterance:goal})}).then(x=>x.json());let r=await request();if(r.error==='embodied_session_not_found'){await renewEmbodiedSession();r=await request()}if(r.error){finishMotionResult(r,goal);return}if(r.status!=='teaching_control_granted'){finishMotionResult(r.perception||r,goal);return}document.querySelector('#teachingPanel').classList.add('show');document.querySelector('#startTeaching').disabled=true;document.querySelector('#replayTeaching').disabled=true;document.querySelector('#evaluation').classList.remove('show');document.querySelectorAll('[data-control]').forEach(b=>b.disabled=false);syncRuntimeObjects(r.session.runtime_objects||[]);setRobot(r.session.state.executor_position,r.session.state.executor_yaw_deg);setCameraMode('first_person');update(r.session);log(`真人教学已开始：${goal}\n${r.prompt}`);speak(r.prompt,0);document.querySelector('#state').textContent=r.status}
    async function teachingControl(control){if(teachingBusy)return;teachingBusy=true;try{const started=await fetch('/embodied/teaching/control',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,control})}).then(x=>x.json());await runStarted(started,`教学控制：${control}`)}finally{teachingBusy=false}}
    async function recordTeachingSignal(signalType){const labels={demonstration:'示范',correction:'纠正',boundary_indication:'边界',negative_example:'负例',confirmation:'确认'};const r=await fetch('/embodied/teaching/signal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,signal_type:signalType})}).then(x=>x.json());if(r.session)update(r.session);document.querySelector('#state').textContent=r.status;log(`教学信令：${labels[signalType]}\n${r.signal?.detail||r.error}`)}
    async function holdTeachingControl(control){if(heldTeachingControl)return;heldTeachingControl=control;while(heldTeachingControl===control){await teachingControl(control);if(heldTeachingControl!==control)break;await new Promise(resolve=>setTimeout(resolve,70))}}
    function releaseTeachingControl(){heldTeachingControl=null}
    async function finishTeaching(){const r=await fetch('/embodied/teaching/finish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId})}).then(x=>x.json());finishMotionResult(r,'完成示教');if(r.status==='demonstration_compiled'){document.querySelector('#replayTeaching').disabled=false;document.querySelectorAll('[data-control]').forEach(b=>b.disabled=true);setCameraMode('safety')}}
    async function replayTeaching(){document.querySelector('#evaluation').classList.remove('show');const started=await fetch('/embodied/teaching/replay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId})}).then(x=>x.json());if(started.session)syncRuntimeObjects(started.session.runtime_objects||[]);setRobot(started.session.state.executor_position,started.session.state.executor_yaw_deg);setCameraMode('safety');speak(started.prompt,0);await runStarted(started,'机器人自主复做')}
    async function evaluateReplay(accepted){const r=await fetch('/embodied/teaching/evaluate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,accepted})}).then(x=>x.json());document.querySelector('#evaluation').classList.remove('show');finishMotionResult(r,accepted?'做得很好':'重新教学');if(r.status==='experience_learned'){availableExperienceId=r.persisted_experience?.experience_id||availableExperienceId;document.querySelector('#runLearned').disabled=!availableExperienceId;document.querySelector('#teachingPanel').classList.remove('show');document.querySelector('#startTeaching').disabled=false}else{document.querySelector('#startTeaching').disabled=false}}
    async function runLearnedExperience(){if(!availableExperienceId)return;const started=await fetch('/embodied/experience/replay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,experience_id:availableExperienceId})}).then(x=>x.json());if(started.status!=='learned_replay_started'){finishMotionResult(started.perception||started,'执行已学经验');return}if(started.session){syncRuntimeObjects(started.session.runtime_objects||[]);setRobot(started.session.state.executor_position,started.session.state.executor_yaw_deg)}setCameraMode('safety');speak(started.prompt,0);await runStarted(started,'冷启动执行已学经验')}
    document.querySelector('#send').onclick=send;document.querySelector('#approve').onclick=()=>answerConfirmation(true);document.querySelector('#decline').onclick=()=>answerConfirmation(false);document.querySelector('#stool').onclick=placeStool;document.querySelector('#applyPolicy').onclick=applyPolicy;document.querySelector('#applyPerception').onclick=applyPerceptionScenario;document.querySelector('#runInquiry').onclick=runCognitiveInquiry;document.querySelector('#runLearned').onclick=runLearnedExperience;document.querySelector('#startTeaching').onclick=startTeaching;document.querySelector('#firstPerson').onclick=()=>setCameraMode('first_person');document.querySelector('#safetyView').onclick=()=>setCameraMode('safety');document.querySelectorAll('[data-signal]').forEach(b=>b.onclick=()=>recordTeachingSignal(b.dataset.signal));document.querySelectorAll('[data-control]').forEach(b=>{if(['grasp','fill','handover'].includes(b.dataset.control))b.onclick=()=>teachingControl(b.dataset.control);else{b.onpointerdown=e=>{e.preventDefault();holdTeachingControl(b.dataset.control)};b.onpointerup=releaseTeachingControl;b.onpointerleave=releaseTeachingControl;b.onpointercancel=releaseTeachingControl}});document.querySelector('#finishTeaching').onclick=finishTeaching;document.querySelector('#replayTeaching').onclick=replayTeaching;document.querySelector('#acceptReplay').onclick=()=>evaluateReplay(true);document.querySelector('#correctReplay').onclick=()=>evaluateReplay(false);document.querySelector('#reset').onclick=()=>location.reload();document.querySelector('#command').onkeydown=e=>{if(e.key==='Enter')send()};document.addEventListener('keydown',e=>{if(!document.querySelector('#teachingPanel').classList.contains('show')||e.target.tagName==='INPUT')return;const controls={KeyW:'forward',KeyS:'backward',KeyA:'turn_left',KeyD:'turn_right'};if(controls[e.code]){e.preventDefault();teachingControl(controls[e.code])}});document.addEventListener('pointerup',releaseTeachingControl);
    addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();if(cameraMode==='safety')frameCamera();renderer.setSize(innerWidth,innerHeight);positionSpeech()});(function loop(){requestAnimationFrame(loop);updateTeachingCamera();positionSpeech();renderer.render(scene,camera)})(); update(session);document.querySelector('#runLearned').disabled=!availableExperienceId;document.querySelector('#state').textContent='等待指令';log(availableExperienceId?`已从本地载入可信经验：${availableExperienceId}`:'场景与本体画像已加载');speak(availableExperienceId?'我已载入一条可信本地经验，会在执行前重新绑定当前对象。':'我已准备好，请给我一个指令。',4200);
  })().catch(error=>{document.querySelector('#state').textContent='场景加载失败';document.querySelector('#log').textContent=error.stack||error.message});
    // A start response may contain both an immediate planning summary and a
    // motion job. The job is authoritative for execution; poll it first.
    async function runStarted(started,utterance){let jobId=started.job_id;if(!jobId&&started.immediate_result){finishMotionResult(started.immediate_result,utterance);return}if(started.body_self_judgment?.explanation)speak(started.body_self_judgment.explanation,0);while(jobId){const step=await fetch('/embodied/motion/step',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:jobId})}).then(x=>x.json());if(step.status==='path_invalidated_and_replanned'){log(`环境或策略已变化，旧路径 ${step.old_job_id} 作废并重新判断`);const replacement=step.replacement;if(replacement.immediate_result&&!replacement.job_id){finishMotionResult(replacement.immediate_result,utterance);return}jobId=replacement.job_id;continue}if(step.frame)setRobot(step.frame.position,step.frame.yaw_deg??null);if(step.session)update(step.session);if(step.status==='motion_completed'){finishMotionResult(step.result,utterance);if(step.result?.next_stage_started?.job_id){jobId=step.result.next_stage_started.job_id;continue}return}if(step.error){finishMotionResult(step,utterance);return}await new Promise(resolve=>setTimeout(resolve,step.frame?.duration_ms||45))}}
